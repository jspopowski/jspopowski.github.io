<footer class="footer">

    <div class="footer__inner">
      <div class="footer__info">
        <h3>{{ site.author.name }}</h3>
        <p>{{ site.author.department }}, {{ site.author.institution }}</p>
      </div>

      <div class="footer__social">

        <a href="mailto:{{ site.social.email }}" class="social-link" aria-label="Email" title="Email">

        <!-- Google Scholar -->
        <a href="{{ site.social.scholar }}" class="social-link" aria-label="Google Scholar" title="Google Scholar" target="_blank" rel="noopener">
