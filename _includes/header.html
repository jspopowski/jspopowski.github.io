<header class="header">
  <div class="header__inner">
    <a href="{{ '/' | relative_url }}" class="header__logo">{{ site.title }}</a>

    <nav class="header__nav">
      <ul class="nav__list">
        {% for path in site.header_pages %}
          {% assign nav_page = site.pages | where: "path", path | first %}
          {% if nav_page.title %}
          <li>
            <a href="{{ nav_page.url | relative_url }}" class="nav__link{% if page.url == nav_page.url %} nav__link--active{% endif %}">
              {{ nav_page.title }}
            </a>
          </li>
          {% endif %}
        {% endfor %}
      </ul>

      <button class="theme-toggle" aria-label="Toggle dark/light mode" title="Toggle theme">
        <!-- Sun icon (shown in dark mode) -->
        <svg class="theme-toggle__sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line>
          <line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line>
          <line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
        <!-- Moon icon (shown in light mode) -->
        <svg class="theme-toggle__moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
        </svg>
      </button>

      <button class="mobile-menu-toggle" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
    </nav>
  </div>
</header>
