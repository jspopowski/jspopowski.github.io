---
layout: default
---

<div class="section">
  <div class="container{% if page.narrow %} container--narrow{% endif %}">
    {% if page.title %}
    <div class="section-header animate-on-scroll">
      {% if page.label %}<p class="section-header__label">{{ page.label }}</p>{% endif %}
      <h1 class="section-header__title">{{ page.title }}</h1>
      {% if page.description %}<p class="section-header__description">{{ page.description }}</p>{% endif %}
    </div>
    {% endif %}

    <div class="page-content-inner animate-on-scroll">
      {{ content }}
    </div>
  </div>
</div>
